<svg viewBox="0 0 620 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <defs>
    <linearGradient id="surf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1e26"/>
      <stop offset="1" stop-color="#0f1116"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F72585"/>
    </linearGradient>
    <filter id="raised" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="6" dy="6" stdDeviation="7" flood-color="#05060a" flood-opacity="0.9"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="7" flood-color="#2a3038" flood-opacity="0.55"/>
    </filter>
    <filter id="inset" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#2a3038" flood-opacity="0.5"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="3" flood-color="#05060a" flood-opacity="0.8"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="20" y="22" width="580" height="56" rx="20" fill="url(#surf)" filter="url(#raised)"/>
  <rect x="20" y="22" width="580" height="56" rx="20" fill="none" stroke="#252b34" stroke-width="1"/>
  <rect x="42" y="40" width="6" height="20" rx="3" fill="url(#neon)" filter="url(#glow)"/>
  <text x="66" y="58" font-family="'Cascadia Code','Consolas','Courier New',monospace" font-size="22" font-weight="700" fill="#e6edf3" dominant-baseline="middle">&gt; connect --me</text>
</svg>