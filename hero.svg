<svg viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg" fill="none">

  <defs>
    <linearGradient id="surf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1e26"/>
      <stop offset="1" stop-color="#0f1116"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#F72585"/>
    </linearGradient>
    <filter id="raised" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="6" dy="6" stdDeviation="7" flood-color="#05060a" flood-opacity="0.9"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="7" flood-color="#2a3038" flood-opacity="0.55"/>
    </filter>
    <filter id="inset" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#2a3038" flood-opacity="0.5"/>
      <feDropShadow dx="-3" dy="-3" stdDeviation="3" flood-color="#05060a" flood-opacity="0.8"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="860" height="210" rx="32" fill="url(#surf)" filter="url(#raised)"/>
  <rect x="20" y="20" width="860" height="210" rx="32" fill="none" stroke="#252b34" stroke-width="1.2"/>
  <circle cx="78" cy="78" r="9" fill="#22D3EE" filter="url(#glow)"/>
  <text x="98" y="84" font-family="'Cascadia Code','Consolas','Courier New',monospace" font-size="17" fill="#8b97a7">system.status = online</text>
  <text x="450" y="148" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif" font-size="64" font-weight="800" letter-spacing="6" fill="url(#neon)" filter="url(#glow)">SHRESHTH</text>
  <text x="450" y="190" text-anchor="middle" font-family="'Cascadia Code','Consolas','Courier New',monospace" font-size="18" fill="#a9b4c2" letter-spacing="2">Frontend Engineer &#8226; building interfaces from the future</text>
  <rect x="360" y="206" width="180" height="4" rx="2" fill="url(#neon)" opacity="0.8"/>
</svg>